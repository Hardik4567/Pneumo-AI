<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PneumoAI • Login</title>
  
  <!-- Your existing theme -->
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
      background: #070b18;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      z-index: 10;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px 36px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--grad-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: var(--glow-blue);
    }
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      margin-top: 8px;
    }
    .error-msg {
      color: #ff4757;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Background Effects -->
  <div class="page-bg"></div>
  <div class="grid-overlay"></div>

  <div class="login-container">
    <div class="login-card scan-line-anim">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🫁</div>
        <div class="logo-text">PNEUMO Ai</div>
      </div>

      <h2 style="text-align:center; margin-bottom:8px; font-size:22px;">Welcome Back</h2>
      <p style="text-align:center; color:var(--text-muted); margin-bottom:32px;">
        Sign in to access the diagnostic platform
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label class="input-label">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="you@hospital.com" required />
        </div>

        <div class="form-group">
          <label class="input-label">Password</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required />
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; font-size:13px;">
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
            <input type="checkbox" id="remember" style="accent-color:var(--accent-blue);"/>
            <span style="color:var(--text-secondary);">Remember me</span>
          </label>
          <a href="#" style="color:var(--accent-blue); text-decoration:none;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
          <i class="fas fa-sign-in-alt"></i>
          Sign In
        </button>

        <div id="errorMsg" class="error-msg"></div>
      </form>

      <div style="text-align:center; margin-top:28px; font-size:13px; color:var(--text-muted);">
    Don't have an account? 
    <a href="/register" style="color:var(--accent-teal); text-decoration:none;">Create Account</a>
</div>

<div style="text-align:center; margin-top:12px; font-size:12px;">
    <a href="/landing" style="color:rgba(252, 252, 252, 0.956); text-decoration:none;">
        Learn more about PneumoAI →
    </a>
</div>
    </div>
  </div>


<script>
if (localStorage.getItem('accessToken')) {
    window.location.href = '/dashboard';
}
</script>

  <!-- Link to your existing login.js -->
  <script src="/static/js/login.js"></script>
</body>
</html>
