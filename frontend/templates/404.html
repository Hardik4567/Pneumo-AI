{% extends 'base.html' %}
{% block title %}404 — Not Found | PneumoAI{% endblock %}
{% block content %}
<style>
  .error-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 120px)}
  .error-inner{text-align:center;max-width:480px}
  .error-code{font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,#4f8ef7,#7c5cbf,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fade-up 0.6s ease both}
  .error-lung{width:100px;height:100px;margin:0 auto 20px;position:relative;animation:fade-up 0.6s ease 0.1s both}
  .error-lung svg{filter:drop-shadow(0 0 16px rgba(79,142,247,0.5));animation:lung-breathe 4s ease-in-out infinite}
  .error-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px;animation:fade-up 0.6s ease 0.2s both}
  .error-desc{font-size:14px;color:rgba(255,255,255,0.45);line-height:1.65;margin-bottom:28px;animation:fade-up 0.6s ease 0.3s both}
  .error-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fade-up 0.6s ease 0.4s both}
  .ring-1,.ring-2,.ring-3{position:absolute;border-radius:50%;border:1px solid;top:50%;left:50%;transform:translate(-50%,-50%)}
  .ring-1{width:140px;height:140px;border-color:rgba(79,142,247,0.1);animation:ring-pulse 3s ease-in-out infinite}
  .ring-2{width:110px;height:110px;border-color:rgba(124,92,191,0.15);animation:ring-pulse 3s ease-in-out 0.5s infinite}
  .ring-3{width:80px;height:80px;border-color:rgba(0,212,170,0.2);animation:ring-pulse 3s ease-in-out 1s infinite}
  @keyframes ring-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}}
</style>
<div class="error-page">
  <div class="error-inner">
    <div class="error-code">404</div>
    <div class="error-lung" style="margin:0 auto 24px;position:relative;width:140px;height:140px">
      <div class="ring-1"></div>
      <div class="ring-2"></div>
      <div class="ring-3"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
        <svg viewBox="0 0 120 110" fill="none" width="70" height="64">
          <defs><linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#00d4aa"/></linearGradient></defs>
          <path d="M60 14C60 14 53 8 44 8C33 8 24 18 24 32C24 50 27 68 21 80C15 92 9 98 14 101C19 104 28 96 34 84C37 78 39 66 42 56C45 46 48 36 51 28C53 22 56 18 58 15" stroke="url(#eg)" stroke-width="2.5" stroke-linecap="round" fill="rgba(79,142,247,0.05)"/>
          <path d="M60 14C60 14 67 8 76 8C87 8 96 18 96 32C96 50 93 68 99 80C105 92 111 98 106 101C101 104 92 96 86 84C83 78 81 66 78 56C75 46 72 36 69 28C67 22 64 18 62 15" stroke="url(#eg)" stroke-width="2.5" stroke-linecap="round" fill="rgba(124,92,191,0.05)"/>
          <line x1="60" y1="14" x2="60" y2="96" stroke="url(#eg)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        </svg>
      </div>
    </div>
    <div class="error-title">Page Not Found</div>
    <div class="error-desc">The page you're looking for doesn't exist or has been moved to a different location.</div>
    <div class="error-actions">
      <a href="/"       class="btn btn-primary"><i class="fas fa-house"></i> Go Home</a>
      <a href="/upload" class="btn btn-ghost"><i class="fas fa-microchip"></i> New Analysis</a>
    </div>
  </div>
</div>
{% endblock %}
