<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PneumoAI • Register</title>
  
  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
      background: #070b18;
    }
    .register-container {
      width: 100%;
      max-width: 460px;
      z-index: 10;
    }
    .register-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--grad-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: var(--glow-blue);
    }
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px; font-weight: 700;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group { margin-bottom: 16px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .input-field {
      width: 100%;
      padding: 13px 16px;
    }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }
    .input-wrap .input-field { padding-left: 38px; }
    .input-wrap .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      background: none; border: none;
    }
    .input-wrap .toggle-pass:hover { color: var(--text-secondary); }
    .btn-register {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      margin-top: 8px;
    }
    .error-msg {
      color: #ff4757;
      font-size: 13px;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(255,71,87,0.08);
      border: 1px solid rgba(255,71,87,0.2);
      border-radius: 8px;
      display: none;
    }
    .success-msg {
      color: #00d4aa;
      font-size: 13px;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      border-radius: 8px;
      display: none;
    }
    .password-strength {
      margin-top: 6px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .password-strength-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="page-bg"></div>
  <div class="grid-overlay"></div>

  <div class="register-container fade-up">
    <div class="register-card scan-line-anim">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🫁</div>
        <div class="logo-text">PNEUMOAi</div>
      </div>

      <h2 style="text-align:center; margin-bottom:6px; font-size:22px;">Create Account</h2>
      <p style="text-align:center; color:var(--text-muted); margin-bottom:28px; font-size:13px;">
        Join PneumoAI to start detecting pneumonia with AI
      </p>

      <form id="registerForm">

        <!-- Full Name + Username -->
        <div class="form-row">
          <div class="form-group">
            <label class="input-label">Full Name</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="fullName" class="input-field" placeholder="Dr. John Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label class="input-label">Username</label>
            <div class="input-wrap">
              <i class="fas fa-at input-icon"></i>
              <input type="text" id="username" class="input-field" placeholder="johndoe" required />
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="input-field" placeholder="you@hospital.com" required />
          </div>
        </div>

        <!-- Mobile -->
        <div class="form-group">
          <label class="input-label">Mobile Number</label>
          <div class="input-wrap">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" id="mobileNumber" class="input-field" placeholder="9876543210" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="input-label">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required />
            <button type="button" class="toggle-pass" id="togglePass">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
          <div class="password-strength">
            <div class="password-strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="input-label">Confirm Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirmPassword" class="input-field" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-register" id="registerBtn">
          <i class="fas fa-user-plus"></i>
          Create Account
        </button>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

      </form>

      <div style="text-align:center; margin-top:24px; font-size:13px; color:var(--text-muted);">
        Already have an account?
        <a href="/" style="color:var(--accent-teal); text-decoration:none; font-weight:500;"> Sign In</a>
      </div>

    </div>
  </div>

<script>
// Redirect if already logged in
if (localStorage.getItem('accessToken')) {
    window.location.href = '/dashboard';
}

// Password visibility toggle
document.getElementById('togglePass').addEventListener('click', function() {
    const input = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
});

// Password strength meter
document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let strength = 0;

    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
        { width: '0%',   color: '',          label: '' },
        { width: '25%',  color: '#ff4757',   label: 'Weak' },
        { width: '50%',  color: '#f0a060',   label: 'Fair' },
        { width: '75%',  color: '#4f8ef7',   label: 'Good' },
        { width: '100%', color: '#00d4aa',   label: 'Strong' },
    ];

    fill.style.width = levels[strength].width;
    fill.style.background = levels[strength].color;
    text.textContent = levels[strength].label;
    text.style.color = levels[strength].color;
});

// Register form submit
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fullName       = document.getElementById('fullName').value.trim();
    const username       = document.getElementById('username').value.trim();
    const email          = document.getElementById('email').value.trim();
    const mobileNumber   = document.getElementById('mobileNumber').value.trim();
    const password       = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const btn        = document.getElementById('registerBtn');

    errorMsg.style.display   = 'none';
    successMsg.style.display = 'none';

    // Validate passwords match
    if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
    }

    // Validate mobile number (10 digits)
    if (!/^\d{10}$/.test(mobileNumber)) {
        errorMsg.textContent = 'Mobile number must be exactly 10 digits.';
        errorMsg.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fullName:      fullName,
                username:      username,
                emailId:       email,
                mobileNumber:  mobileNumber,
                password:      password,
            })
        });

        const data = await response.json();

        if (response.ok) {
            successMsg.textContent = 'Account created successfully! Redirecting to login...';
            successMsg.style.display = 'block';
            setTimeout(() => { window.location.href = '/'; }, 2000);
        } else {
            errorMsg.textContent = data.detail || 'Registration failed. Please try again.';
            errorMsg.style.display = 'block';
        }

    } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Is the backend running?';
        errorMsg.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
});
</script>

</body>
</html>
