<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PneumoAI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}"/>
  {% block page_css %}{% endblock %}
  <style>html,body{background:#070b18!important;color:#fff}</style>
</head>
<body>

<div class="page-bg"></div>
<div class="grid-overlay"></div>
<div id="particles"></div>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <i class="fas fa-lungs" style="color:#fff;font-size:15px"></i>
      </div>
      <span class="sidebar-logo-text">PNEUMO AI</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item {% if request.endpoint=='dashboard' %}active{% endif %}"><i class="fas fa-gauge-high"></i> Dashboard</a>
      <a href="/upload"    class="nav-item {% if request.endpoint=='upload'    %}active{% endif %}"><i class="fas fa-upload"></i> Upload Scan</a>
      <a href="/history"   class="nav-item {% if request.endpoint=='history'   %}active{% endif %}"><i class="fas fa-clock-rotate-left"></i> History</a>
      <a href="/results"   class="nav-item {% if request.endpoint=='results'   %}active{% endif %}"><i class="fas fa-file-medical"></i> Reports</a>
      <!-- <a href="/analytics" class="nav-item {% if request.endpoint=='analytics' %}active{% endif %}"><i class="fas fa-chart-line"></i> Analytics</a> -->

      <div class="nav-divider"></div>

      <a href="/profile"  class="nav-item {% if request.endpoint=='profile'   %}active{% endif %}"><i class="fas fa-user"></i> Profile</a>
      <a href="#"         class="nav-item"><i class="fas fa-gear"></i> Settings</a>
      <!-- <a href="#"         class="nav-item"><i class="fas fa-circle-question"></i> Support</a> -->
      <a href="#"         class="nav-item" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Logout</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <!-- <div class="topbar-search">
        <i class="fas fa-magnifying-glass"></i>
        <input type="text" placeholder="Search scans, patients..."/>
      </div> -->
      <div class="topbar-right">
        <!-- <div class="topbar-icon-btn" title="Notifications">
          <i class="fas fa-bell"></i>
        </div>
        <div class="topbar-icon-btn" title="Settings">
          <i class="fas fa-gear"></i>
        </div> -->
        <div class="topbar-avatar">DR</div>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      {% block content %}{% endblock %}
    </div>

  </div>
</div>

<script>
/* Particles */
(function(){
  const c = document.getElementById('particles');
  if(!c) return;
  for(let i=0;i<25;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1+Math.random()*3;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:rgba(${Math.random()>0.5?'79,142,247':'0,212,170'},0.5);
      animation-duration:${15+Math.random()*20}s;
      animation-delay:${Math.random()*15}s;
    `;
    c.appendChild(p);
  }
})();

/* Backend status */
(function(){
  fetch('/api/backend-status',{signal:AbortSignal.timeout(4000)})
    .then(r=>r.json()).then(d=>{
      window.__backendOnline = d.backend==='online';
    }).catch(()=>{ window.__backendOnline=false; });
})();

/* Toast */
window.PneumoAI = {
  showToast(msg, type, dur){
    dur=dur||3500;
    const colors={success:'#00d4aa',error:'#ff4757',warning:'#f0a060',info:'#4f8ef7'};
    const t=document.createElement('div');
    t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 18px;background:rgba(13,18,40,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:fade-up 0.3s ease both;max-width:320px;font-family:Inter,sans-serif;`;
    t.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${colors[type]||colors.info};flex-shrink:0"></div><span>${msg}</span>`;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), dur);
  }
};
</script>

{% block page_js %}{% endblock %}
</body>
</html>
